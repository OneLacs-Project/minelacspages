<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — MineLacs</title>
    <meta name="theme-color" content="#FF8C00">
    <link rel="icon" type="image/png" href="/images/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .error-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        .error-page__code {
            font-size: 8rem;
            font-weight: 800;
            letter-spacing: -0.05em;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 8px;
        }

        .error-page__title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .error-page__desc {
            font-size: 0.95rem;
            color: var(--text-secondary);
            margin-bottom: 28px;
        }

        .error-page__btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 32px;
            font-size: 0.95rem;
            font-weight: 600;
            color: #111111;
            background: var(--accent-gradient);
            border-radius: 50px;
            text-decoration: none;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .error-page__btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(255, 140, 0, 0.3);
        }

        .error-page__ghost {
            font-size: 3rem;
            margin-bottom: 16px;
            animation: ghostFloat 3s ease-in-out infinite;
        }

        @keyframes ghostFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }
    </style>
</head>
<body>
    <div class="error-page">
        <div>
            <div class="error-page__ghost">👻</div>
            <div class="error-page__code">404</div>
            <h1 class="error-page__title">Страница не найдена</h1>
            <p class="error-page__desc">Похоже, эту страницу загриферили.</p>
            <a href="/" class="error-page__btn">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                На главную
            </a>
        </div>
    </div>
    <script src="/js/common.js"></script>
    <script>initThemeToggle();</script>
</body>
</html>
